spring:
  application:
    name: bikeridediary

  # JPA 공통 설정
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
        format_sql: true
        default_batch_fetch_size: 100

  # OAuth2 Provider 설정 (URL은 환경에 무관)
  security:
    oauth2:
      client:
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# JWT 만료 시간 (환경 공통)
jwt:
  access-token-expiry: 3600
  refresh-token-expiry: 2592000

# AWS 리전 (환경 공통)
aws:
  region: ap-northeast-2

# 외부 API Base URL (환경 공통)
openweather:
  base-url: https://api.openweathermap.org/data/2.5

naver:
  search:
    url: https://openapi.naver.com/v1/search/local
  directions:
    url: https://naveropenapi.apigw.ntruss.com/map-direction-15/v1/driving
  geocoding:
    url: https://naveropenapi.apigw.ntruss.com/map-geocode/v2/geocode

kakao:
  local-url: https://dapi.kakao.com/v2/local

opinet:
  base-url: https://www.opinet.co.kr/api

# API-Ninjas (모터사이클 제조사/모델 데이터)
api-ninjas:
  base-url: https://api.api-ninjas.com/v1/motorcycles

# Swagger UI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs

# Server
server:
  port: 8081

# 파일 저장 기본값 (프로필별로 override 가능)
file:
  upload-dir: uploads
  base-url: http://localhost:8081/files