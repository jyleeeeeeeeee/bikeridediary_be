spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bikeridediary
    username: bikeridediary
    password: bikeridediary123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: dummy
            client-secret: dummy
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/{registrationId}"
            authorization-grant-type: authorization_code
            scope: profile_nickname, account_email
          google:
            client-id: dummy
            client-secret: dummy
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/{registrationId}"
            scope: profile, email

